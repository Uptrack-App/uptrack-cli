name: 'Uptrack monitoring-as-code'
description: 'Apply or diff your uptrack.yaml against Uptrack from CI using the uptrack CLI'
branding:
  icon: 'activity'
  color: 'green'

inputs:
  command:
    description: 'apply or diff'
    required: false
    default: 'apply'
  config:
    description: 'Path to the config file'
    required: false
    default: 'uptrack.yaml'
  args:
    description: 'Extra flags passed through to the CLI, e.g. "--dry-run" or "--prune --yes"'
    required: false
    default: ''
  api-key:
    description: 'Uptrack API key — pass ${{ secrets.UPTRACK_API_KEY }}, never a literal'
    required: true
  api-url:
    description: 'API base URL'
    required: false
    default: 'https://api.uptrack.app'

runs:
  using: 'composite'
  steps:
    - name: Install uptrack CLI
      shell: bash
      env:
        # Run the install.sh bundled with THIS pinned action version — not an
        # unpinned `curl | sh` from a moving branch.
        UPTRACK_BIN_DIR: ${{ runner.temp }}/uptrack-bin
      run: |
        set -euo pipefail
        mkdir -p "$UPTRACK_BIN_DIR"
        sh "$GITHUB_ACTION_PATH/install.sh"
        echo "$UPTRACK_BIN_DIR" >> "$GITHUB_PATH"
    - name: uptrack
      shell: bash
      # Inputs go through env (NOT interpolated into the script body) so a value
      # like `; rm -rf …` can't be injected into the shell. Args are split into
      # argv with array expansion; the command is allowlisted.
      env:
        UPTRACK_API_KEY: ${{ inputs.api-key }}
        UPTRACK_API_URL: ${{ inputs.api-url }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        case "$INPUT_COMMAND" in
          apply|diff) ;;
          *) echo "invalid command: '$INPUT_COMMAND' (use 'apply' or 'diff')" >&2; exit 1 ;;
        esac
        read -r -a extra_args <<< "$INPUT_ARGS"
        uptrack "$INPUT_COMMAND" -f "$INPUT_CONFIG" "${extra_args[@]}"
